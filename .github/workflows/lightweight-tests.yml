name: lightweight-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: python -m pip install -e '.[test]'
      - run: python -m pytest -q
      - run: ruff check src tests scripts/generate_v2_schema_artifact.py
      - run: python -m mypy src
      - run: PYTHONPATH=src python scripts/generate_v2_schema_artifact.py
      - run: git diff --exit-code examples/v2_metadata_schema.json
      - run: python -m build
