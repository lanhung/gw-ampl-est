splits:
  generator_qualification: 4096
  train: 65536
  validation: 8192
  calibration_fit: 6144
  sbc_diagnostic: 2048
  iid_test: 16384
  balanced_tail_diagnostic: 4096
  cross_family_misspecification_test: 4096
  parameter_region_ood: 4096
  waveform_mismatch_test: 2048
  psd_mismatch_test: 2048
  real_noise_test: 0
  real_noise_test_status: reserved_unset_requires_separate_gwosc_gate

grouping_contract:
  disjoint_identifiers: [source_id, lens_id, physical_system_id, pair_id, noise_segment_id, augmentation_parent_id]
  calibration_fit_sbc_overlap_allowed: false
  assignment_before_materialization: true

estimator_design:
  id: mask_aware_multimessenger_nsf_v1
  target_parameterization:
    - log_abs_mu_primary
    - log_abs_mu_secondary
  gw_encoder: shared_weight_mask_aware_1d_resnet_by_image_and_detector
  gw_encoder_channels: [32, 64, 128, 256]
  em_encoder: image_keyed_deepsets_plus_scalar_uncertainty_mlp
  fusion: concatenation_with_detector_and_modality_masks
  posterior_family: conditional_neural_spline_flow
  spline_bins: 8
  candidate_flow_transforms: [6, 10]
  candidate_conditioner_widths: [128, 256]
  training_seeds: [0, 1, 2]
  selection_metric: validation_negative_log_probability
  architecture_selection:
    aggregate_across_seeds: mean_validation_negative_log_probability
    robustness_statistic: median_validation_negative_log_probability
    do_not_select_best_seed: true
    report_all_seed_results: true
    primary_summary: mean_and_standard_deviation_across_three_seeds
  tie_break: lower_parameter_count
  maximum_candidate_fits: 12
  posthoc_calibration_split_only: true
  posthoc_calibration_source_split: calibration_fit
  sbc_never_fits_calibration_map: true
  deployable_policy_validation_required: true
  baseline_ids:
    - gw_only_same_backbone
    - em_only_same_backbone
    - non_neural_lens_posterior_matched_prior
    - legacy_sis_point_regression_out_of_domain
    - likelihood_gold_joint_model

posterior_sampling:
  samples_per_case: 4096
  deterministic_seed_domain: posterior_sampling

calibration_protocol:
  marginal_interval: central_equal_tailed
  nominal_coverage_levels: [0.50, 0.80, 0.90, 0.95]
  interval_reporting: wilson_95_percent
  iid_marginal_absolute_error_rule: max_0.01_or_3_binomial_standard_errors
  iid_joint_absolute_error_rule: max_0.015_or_3_binomial_standard_errors
  em_cell_absolute_error_rule: max_0.04_or_3_binomial_standard_errors
  tail_stratum_absolute_error_rule: max_0.06_or_3_binomial_standard_errors
  minimum_em_cell_count: 2048
  minimum_tail_stratum_count: 1024
  joint_region: flow_log_density_highest_density_rank
  simulation_based_calibration:
    source_split: sbc_diagnostic
    replicates: 1024
    posterior_draws_per_replicate: 1024
    histogram_bins: 20
    familywise_test: holm_corrected_chi_square
    familywise_alpha: 0.01
  gold_development_subset:
    source_split: validation
    cases: 256
    may_trigger_method_revision: true
    minimum_importance_sampling_efficiency: 0.10
    required_fraction_meeting_efficiency: 0.95
  gold_final_subset:
    source_split: iid_test
    cases: 256
    may_trigger_method_revision: false
    report_once_after_freeze: true
    failure_action: downgrade_claim_or_new_preregistration_version
    minimum_importance_sampling_efficiency: 0.10
    required_fraction_meeting_efficiency: 0.95

diagnostic_set_definitions:
  balanced_tail_diagnostic:
    assignment: priority_order_first_matching_stratum
    cases_per_stratum: 1024
    strata:
      - {id: high_absolute_magnification, condition: max_selected_abs_mu_greater_equal_20}
      - {id: extreme_relative_magnification, condition: not_prior_and_min_over_max_selected_abs_mu_less_equal_0.10}
      - {id: second_image_near_threshold, condition: not_prior_and_secondary_network_snr_in_10_to_12}
      - {id: extreme_profile_or_environment, condition: not_prior_and_abs_kappa_ext_greater_equal_0.10_or_slope_outside_1.75_to_2.40}
  cross_family_misspecification_test:
    cases_per_cell: 1024
    cells:
      - {truth: sie_external_shear, assumed: epl_external_shear_fixed_slope_2.08}
      - {truth: epl_external_shear, assumed: sie_external_shear}
      - {truth: sie_external_shear, assumed: family_marginalized_sie_epl}
      - {truth: epl_external_shear, assumed: family_marginalized_sie_epl}
  parameter_region_ood:
    cases_per_stratum: 1024
    strata:
      - {id: slope_outside_training, epl_density_slope: "[1.4,1.6) union (2.5,2.7]", branch_probability: 0.5}
      - {id: extreme_flattening, axis_ratio: "[0.25,0.40)"}
      - {id: high_external_shear, shear_amplitude: "(0.15,0.25]"}
      - {id: extreme_external_convergence, abs_external_convergence: "(0.15,0.25]", sign_probability: 0.5}
  waveform_mismatch_test:
    truth_waveform: SEOBNRv4PHM
    assumed_waveform: IMRPhenomXPHM
    cases: 2048
  psd_mismatch_test:
    cases: 2048
    curve_package: bilby
    package_version: "2.6.0"
    package_relative_directory: bilby/gw/detector/noise_curves
    truth_curves:
      H1: {file: aLIGO_ZERO_DET_high_P_psd.txt, sha256: 98d7e2cc5610770cf04d91396d975af5b98299a3498c352c3d660a8992568aab}
      L1: {file: aLIGO_ZERO_DET_high_P_psd.txt, sha256: 98d7e2cc5610770cf04d91396d975af5b98299a3498c352c3d660a8992568aab}
      V1: {file: AdV_psd.txt, sha256: c2532150f63dbaa76d451e2c074390272e259e4e2eedc3e684d2205582aa0764}
    assumed_curves: baseline_psd_curves

