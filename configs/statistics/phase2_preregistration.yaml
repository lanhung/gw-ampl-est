phase: "2"
preregistration_version: "1.0.0-rc.2"
scientific_schema_version: "2.0.0-alpha.3"
frozen_engineering_schema_version: "2.0.0-alpha.2"
root_seed: 2026071202
status: automatic_review_passed
execution_enabled: false
scientific_data_generation_authorized: false
training_authorized: false
gwtc_gwosc_download_authorized: false
engineering_smoke_scientific_use_authorized: false

estimands:
  primary:
    - log_abs_mu_primary
    - log_abs_mu_secondary
  derived:
    - log_abs_mu_secondary_minus_primary
    - relative_abs_magnification_secondary_over_primary
    - relative_strain_amplitude_secondary_over_primary
  conditioning_required:
    - lens_family
    - cosmology
    - external_convergence_and_model_discrepancy
    - population_and_selection_model
    - gw_and_em_observation_models

cosmology:
  baseline: astropy_planck18
  astropy_version: "6.1.7"
  sensitivity_cases:
    - flat_lcdm_h0_73_omega_m_0.30

proposal_distribution:
  id: broad_support_v1
  lens_family_probabilities:
    sie_external_shear: 0.5
    epl_external_shear: 0.5
  lens_redshift: {distribution: uniform, minimum: 0.1, maximum: 1.0}
  source_redshift:
    distribution: conditional_uniform
    minimum: 0.5
    maximum: 3.0
    minimum_separation_from_lens: 0.1
  einstein_radius_arcsec: {distribution: log_uniform, minimum: 0.3, maximum: 3.0}
  axis_ratio: {distribution: uniform, minimum: 0.4, maximum: 1.0}
  position_angle_rad: {distribution: uniform, minimum: 0.0, maximum: 3.141592653589793}
  shear_amplitude: {distribution: uniform, minimum: 0.0, maximum: 0.15}
  shear_angle_rad: {distribution: uniform, minimum: 0.0, maximum: 3.141592653589793}
  epl_density_slope: {distribution: uniform, minimum: 1.6, maximum: 2.5}
  external_convergence: {distribution: uniform, minimum: -0.15, maximum: 0.15}
  source_plane_sampling: uniform_in_solver_bounding_region_then_condition_on_multiple_images

evaluation_distribution:
  id: balanced_literature_informed_benchmark_v1
  claim_boundary: benchmark_not_astrophysical_rate_population
  lens_family_probabilities:
    sie_external_shear: 0.5
    epl_external_shear: 0.5
  lens_redshift: {distribution: uniform, minimum: 0.1, maximum: 1.0}
  source_redshift:
    distribution: conditional_uniform
    minimum: 0.5
    maximum: 3.0
    minimum_separation_from_lens: 0.1
  einstein_radius_arcsec:
    distribution: truncated_log_normal
    median: 1.0
    log_standard_deviation: 0.35
    minimum: 0.3
    maximum: 3.0
  axis_ratio:
    distribution: truncated_normal
    mean: 0.7
    standard_deviation: 0.15
    minimum: 0.4
    maximum: 1.0
  position_angle_rad: {distribution: uniform, minimum: 0.0, maximum: 3.141592653589793}
  shear_amplitude:
    distribution: truncated_half_normal
    standard_deviation: 0.05
    minimum: 0.0
    maximum: 0.15
  shear_angle_rad: {distribution: uniform, minimum: 0.0, maximum: 3.141592653589793}
  epl_density_slope:
    distribution: truncated_normal
    mean: 2.08
    standard_deviation: 0.16
    minimum: 1.6
    maximum: 2.5
  external_convergence:
    distribution: truncated_normal
    mean: 0.0
    standard_deviation: 0.05
    minimum: -0.15
    maximum: 0.15
  source_plane_sampling: uniform_in_multiply_imaged_cross_section

lens_model_discrepancy:
  baseline: none_within_declared_family
  no_hidden_magnification_fudge: true
  stress_tests:
    - fit_sie_external_shear_to_epl_external_shear_truth
    - fit_epl_external_shear_to_sie_external_shear_truth
    - evaluate_density_slope_boundary_regions

source_population:
  id: bbh_benchmark_v1
  claim_boundary: broad_bbh_benchmark_not_gwtc_population_fit
  primary_mass_source_frame_msun:
    distribution: power_law
    exponent: -2.3
    minimum: 20.0
    maximum: 80.0
  mass_ratio:
    distribution: conditional_uniform
    lower_bound_formula: max(0.25, 10.0 / primary_mass_source_frame_msun)
    maximum: 1.0
  secondary_mass_source_frame_minimum_msun: 10.0
  invalid_secondary_mass_policy: impossible_by_conditional_support_not_rejected
  mass_joint_log_density_formula: >-
    log((-1.3)/(80**(-1.3)-20**(-1.3))) - 2.3*log(m1)
    - log(1-max(0.25,10/m1))
  evaluation_source_mass_distribution: identical_to_proposal_source_mass_distribution
  importance_weighting:
    proposal_mass_log_density: mass_joint_log_density_formula
    evaluation_mass_log_density: mass_joint_log_density_formula
    source_mass_log_weight: 0.0
    log_weight: evaluation_log_density_minus_proposal_log_density
    evaluate_both_normalized_densities_before_selection_conditioning: true
  spin_magnitude: {distribution: beta, alpha: 2.0, beta: 5.0, maximum: 0.99}
  spin_orientation: isotropic
  sky_orientation: isotropic
  orbital_phase_rad: {distribution: uniform, minimum: 0.0, maximum: 6.283185307179586}
  luminosity_distance: derived_from_source_redshift_and_declared_cosmology

lens_solver:
  package: lenstronomy
  version: "1.13.6"
  families: [sie_external_shear, epl_external_shear]
  analytic_control: sis
  retain_all_physical_images: true
  external_convergence_forward_model:
    id: mass_sheet_transform_v1
    lambda_formula: 1.0 - external_convergence
    allowed_external_convergence: [-0.25, 0.25]
    source_position_transform: beta_prime_equals_lambda_times_beta
    internal_deflection_transform: alpha_internal_prime_equals_lambda_times_alpha_internal
    surface_density_transform: kappa_prime_equals_lambda_times_kappa_internal_plus_one_minus_lambda
    image_position_transform: invariant
    signed_magnification_transform: mu_prime_equals_mu_divided_by_lambda_squared
    fermat_difference_transform: delta_phi_prime_equals_lambda_times_delta_phi
    time_delay_transform: delta_t_prime_equals_lambda_times_delta_t
    additive_fermat_constant: irrelevant_and_not_stored_as_observable
    required_phase3a_contracts:
      - source_scaling
      - image_position_invariance
      - signed_and_absolute_magnification_scaling
      - fermat_difference_scaling
      - physical_delay_scaling

stellar_kinematics_forward_model:
  id: lenstronomy_galkin_spherical_powerlaw_hernquist_om_v1
  package: lenstronomy
  version: "1.13.6"
  imaging_mass_model: declared_sie_or_epl_external_shear
  dynamics_mass_model: circularized_spherical_power_law
  dynamics_density_slope:
    sie_external_shear: 2.0
    epl_external_shear: use_epl_density_slope
  light_model: HERNQUIST
  effective_radius_arcsec:
    distribution: log_uniform
    minimum: 0.3
    maximum: 2.0
  hernquist_scale_formula: effective_radius_arcsec / 1.8153
  anisotropy_model: Osipkov_Merritt
  anisotropy_radius_over_effective_radius:
    distribution: log_uniform
    minimum: 0.5
    maximum: 5.0
  aperture:
    type: shell
    inner_radius_arcsec: 0.0
    outer_radius_arcsec: 1.0
  psf:
    type: GAUSSIAN
    fwhm_arcsec: 0.7
  line_of_sight_averaging: luminosity_weighted_aperture_average
  external_convergence_treatment: line_of_sight_mass_sheet_excluded_from_bound_stellar_dynamics
  monte_carlo_samples: 4000
  seed_domain: stellar_kinematics
  phase3a_convergence_check:
    reference_samples: 16000
    maximum_relative_difference: 0.02
  shortcut_forbidden: direct_inversion_from_einstein_radius_alone

gw_observation_model:
  id: gaussian_curve_conditioned_h1_l1_v1_v1
  waveform_baseline: IMRPhenomXPHM
  waveform_mismatch: SEOBNRv4PHM
  lalsuite_version: "7.26.1"
  bilby_version: "2.6.0"
  minimum_frequency_hz: 20.0
  reference_frequency_hz: 50.0
  duration_seconds: 8
  sample_rate_hz: 2048
  sample_count: 16384
  dtype: float32
  detector_slots: [H1, L1, V1]
  psd_curves:
    H1:
      file: aLIGO_O4_high_asd.txt
      sha256: eb5ec9b081c3d86d2f4257b9aff6a57566d168b8a95e5e57b7909eebad021780
    L1:
      file: aLIGO_O4_high_asd.txt
      sha256: eb5ec9b081c3d86d2f4257b9aff6a57566d168b8a95e5e57b7909eebad021780
    V1:
      file: AdV_psd.txt
      sha256: c2532150f63dbaa76d451e2c074390272e259e4e2eedc3e684d2205582aa0764
  preprocessing_version: bilby_psd_whiten_v1
  preprocessing_contract:
    - preserve_unwhitened_float32_noisy_clean_noise_products
    - derive_network_input_from_declared_detector_psd
    - verify_finite_unit_scale_whitened_noise_on_qualification_split
    - reject_wraparound_or_edge_truncated_waveforms
  synthetic_noise_label: synthetic_gaussian_curve_conditioned
  label_noise_as_real: false

selection_model:
  id: synthetic_matched_filter_pair_selection_v1
  selected_pair_rule: earliest_two_images_passing_detection
  per_image_network_snr_minimum: 10.0
  per_image_minimum_detectors: 2
  per_detector_snr_minimum: 4.0
  condition_posterior_on_selection: true
  selection_statistics_deployable_inputs: false
  rejected_attempts_append_only: true

em_observation_model:
  id: balanced_eight_cell_benchmark_v2
  assignment: deterministic_balanced_hash_by_physical_system
  claim_boundary: scenario_mixture_not_survey_missingness_rate
  environment_observation:
    representation: posterior_mean_standard_deviation
    latent_quantity: external_convergence
    informative_standard_deviation: 0.02
    weak_standard_deviation: 0.06
    observation_likelihood: posterior_mean_given_truth_is_normal_with_declared_standard_deviation
    covariance_assumption: scalar_independent_of_other_em_measurement_errors
    unavailable_value: null
    availability_mask_name: environment_convergence
  availability_cells:
    full_precise_spectroscopic:
      modalities: [image_astrometry, lens_center, einstein_radius, lens_redshift, source_redshift, velocity_dispersion, environment_convergence]
      astrometry_std_arcsec: 0.005
      lens_center_std_arcsec: 0.01
      einstein_radius_fractional_std: 0.03
      lens_redshift: {mode: spectroscopic, standard_deviation_scale_1_plus_z: 0.001}
      source_redshift: {mode: spectroscopic, standard_deviation_scale_1_plus_z: 0.001}
      velocity_dispersion_fractional_std: 0.05
      environment_state: informative
      uncertainty_covariance: diagonal
      timing_std_seconds: 0.001
    full_photometric_redshifts:
      modalities: [image_astrometry, lens_center, einstein_radius, lens_redshift, source_redshift, velocity_dispersion, environment_convergence]
      astrometry_std_arcsec: 0.02
      lens_center_std_arcsec: 0.03
      einstein_radius_fractional_std: 0.10
      lens_redshift: {mode: photometric, standard_deviation_scale_1_plus_z: 0.05}
      source_redshift: {mode: photometric, standard_deviation_scale_1_plus_z: 0.05}
      velocity_dispersion_fractional_std: 0.10
      environment_state: weak
      uncertainty_covariance: diagonal
      timing_std_seconds: 0.01
    no_velocity_dispersion:
      modalities: [image_astrometry, lens_center, einstein_radius, lens_redshift, source_redshift, environment_convergence]
      astrometry_std_arcsec: 0.01
      lens_center_std_arcsec: 0.02
      einstein_radius_fractional_std: 0.05
      lens_redshift: {mode: spectroscopic, standard_deviation_scale_1_plus_z: 0.001}
      source_redshift: {mode: spectroscopic, standard_deviation_scale_1_plus_z: 0.001}
      velocity_dispersion_fractional_std: null
      environment_state: informative
      uncertainty_covariance: diagonal
      timing_std_seconds: 0.002
    no_source_redshift:
      modalities: [image_astrometry, lens_center, einstein_radius, lens_redshift, velocity_dispersion, environment_convergence]
      astrometry_std_arcsec: 0.01
      lens_center_std_arcsec: 0.02
      einstein_radius_fractional_std: 0.05
      lens_redshift: {mode: spectroscopic, standard_deviation_scale_1_plus_z: 0.001}
      source_redshift: null
      velocity_dispersion_fractional_std: 0.10
      environment_state: weak
      uncertainty_covariance: diagonal
      timing_std_seconds: 0.002
    no_lens_redshift:
      modalities: [image_astrometry, lens_center, einstein_radius, source_redshift, velocity_dispersion, environment_convergence]
      astrometry_std_arcsec: 0.01
      lens_center_std_arcsec: 0.02
      einstein_radius_fractional_std: 0.05
      lens_redshift: null
      source_redshift: {mode: spectroscopic, standard_deviation_scale_1_plus_z: 0.001}
      velocity_dispersion_fractional_std: 0.10
      environment_state: weak
      uncertainty_covariance: diagonal
      timing_std_seconds: 0.002
    astrometry_redshifts_only:
      modalities: [image_astrometry, lens_center, lens_redshift, source_redshift]
      astrometry_std_arcsec: 0.01
      lens_center_std_arcsec: 0.02
