stopping_rule:
  comparison_16k_to_32k:
    nlp_improvement_ci_upper_max_nat_per_target_dimension: 0.01
    median_crps_relative_improvement_max: 0.01
    maximum_marginal_coverage_error_improvement_max: 0.005
    development_em_cell_maximum_absolute_coverage_error: 0.04
    development_joint_maximum_absolute_coverage_error: 0.05
    maximum_em_cell_coverage_degradation: 0.02
    seed_agreement: all_three_seed_point_estimates_below_nlp_and_crps_thresholds
    require_all_conditions: true
    gray_zone_action: continue_to_train_65k
    meaningful_improvement_action: continue_to_train_65k
    saturation_action: lock_train_32k
  comparison_32k_to_65k:
    thresholds_identical_to_16k_to_32k: true
