    nlp_improvement_ci_upper_max_nat_per_target_dimension: 0.01
    median_crps_relative_improvement_max: 0.01
    all_three_seed_nlp_and_crps_point_improvements_below_threshold: true
    require_all: true
  required_nonblocking_diagnostics:
    - raw_marginal_and_joint_coverage
    - all_em_cell_raw_coverage
    - em_cell_coverage_degradation
    - all_four_development_tail_stratum_nlp_and_crps
