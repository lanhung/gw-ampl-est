  evaluate_retained_65k_and_new_131k_checkpoints_on_same_development_tail_pool: true
  posthoc_calibration_during_scale_selection: false
  best_seed_selection_forbidden: true

terminal_comparison:
  comparison: corrected_train_65k_to_train_131k_terminal
  paired_bootstrap:
    resampling_unit: core_validation_physical_system_id
    replicates: 10000
    confidence_level: 0.95
    statistic: mean_nlp_improvement_nat_per_target_dimension
